name: Keep Database Alive

on:
  schedule:
    # Menjalankan aksi setiap 5 menit
    - cron: '*/5 * * * *'
  workflow_dispatch: # Mengizinkan untuk dijalankan secara manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Website and API
        run: |
          echo "Pinging main website..."
          curl -s -o /dev/null -w "Status Code: %{http_code}\n" https://website-desa-huta-namora.vercel.app/
          
          echo "Pinging keepalive endpoint..."
          curl -s -o /dev/null -w "Status Code: %{http_code}\n" https://website-desa-huta-namora.vercel.app/api/trpc/keepalive
